<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoNote | Secure Open Source</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <script type="module" src="index.js" defer></script>
    <div id="lock-screen" class="overlay hidden">
        <div class="neo-card glow-card">
            <h3>🔒 NeoNote Access</h3>
            <p id="lock-status">App is fully offline and secure.</p>
            <input type="password" id="unlock-pass" placeholder="Enter Access Code">
            <button id="unlock-btn" class="glow-button">Unlock Note Vault</button>
            <p id="forgot-phrase" class="link-text">Reset with Secret Phrase</p>
        </div>
    </div>

    <div class="app-container">
        <aside class="sidebar neo-card">
            <div class="sidebar-header">
                <h1 class="logo-text">NeoNote<span class="logo-accent"></span></h1>
                <input type="text" id="search-bar" placeholder="Search...">
            </div>
            
            <ul id="notes-list">
                <li class="note-item selected">
                    <span class="note-icon">✍️</span> Notes
                </li>
                <li class="note-item locked-item">
                    <span class="note-icon">🔏</span>Locked
                </li>
            </ul>

            <div class="footer-controls">
                <select id="theme-menu" class="minimal-select">
                    <option value="dark">Dark Mode</option>
                    <option value="light">Light Mode</option>
                </select>
                <div class="status-tag">Secure by default🛡️</div>
            </div>
        </aside>

        <main class="editor neo-card">
            <div class="editor-header">
                <div class="metadata"></div>
                <div class="editor-tools">
                    <button id="lock-note-btn" class="glow-button">🔒</button>
                    <button id="Clear-btn" class="glow-button">🧹Clear</button>
                    <button id="save-btn" class="glow-button">Save</button>
                    <button id="delete-btn" class="glow-button">Delete</button>
                </div>
            </div>
            
            <input type="text" id="note-title" placeholder="Title">
            <textarea id="note-content" placeholder="Start typing your thoughts..."></textarea>
        </main>
    </div>

</body>
</html>
